sources:
  - name: EGU Training Schools
    url: https://www.egu.eu/meetings/training-schools/
    layer: 1
    region: continental Europe
    source_type: scientific_society
    keywords: [geoscience, hydrology, climate, training school]
    scan_frequency: every_run
    notes: Core geoscience training source.
  - name: IAHS
    url: https://iahs.info/
    layer: 1
    region: global
    source_type: scientific_society
    keywords: [hydrology, water resources, training]
    scan_frequency: every_run
    enabled: false
    check_manually: true
    notes: International Association of Hydrological Sciences. Cloudflare blocks the GitHub Actions runner's IP with a 403 (it loads fine from a normal browser). Check it directly.
  - name: IAH
    url: https://iah.org/
    layer: 1
    region: global
    source_type: scientific_society
    keywords: [hydrogeology, groundwater, training]
    scan_frequency: every_run
    notes: International Association of Hydrogeologists.
  - name: CUAHSI
    url: https://www.cuahsi.org/workshops
    layer: 1
    region: North America
    source_type: research_network
    keywords: [hydrology, water, short course]
    scan_frequency: every_run
    enabled: false
    check_manually: true
    notes: Hydrology workshops and training. The workshops page is a single-page app that loads its list only after interaction, so scripted requests see no content. Check it directly.
  - name: NASA ARSET
    url: https://www.earthdata.nasa.gov/data/projects/arset
    layer: 1
    region: global
    source_type: agency
    keywords: [remote sensing, water, climate, training]
    scan_frequency: every_run
    enabled: false
    check_manually: true
    notes: NASA Applied Remote Sensing Training. The site is unreachable / returns 403 from the GitHub Actions runner's network, and most ARSET trainings are online anyway. Check it directly.
  - name: DAAD Short Courses
    url: https://www.daad.de/en/study-and-research-in-germany/scholarships/daad-scholarships/
    layer: 1
    region: continental Europe
    source_type: funding_body
    keywords: [short course, scholarship, Germany]
    scan_frequency: every_run
    notes: Funding source; opportunity pages may be linked elsewhere.
  - name: ELLIS
    url: https://ellis.eu/events
    layer: 1
    region: continental Europe
    source_type: research_network
    keywords: [AI, machine learning, summer school]
    scan_frequency: every_run
    enabled: false
    notes: AI and scientific ML events. The site is a single-page app whose detail pages are empty shells, but its server-rendered listing carries each event's dates and location inline, so it is parsed by a dedicated listing collector (see src/research_school_radar/api_sources.py).
  - name: IHE Delft
    url: https://www.un-ihe.org/short-courses
    layer: 1
    region: continental Europe
    source_type: university_institute
    keywords: [water, hydrology, short course, scholarship]
    scan_frequency: every_run
    enabled: false
    notes: Premier water education source. The listing is client-side rendered (empty HTML), so it is collected directly from its public JSON API instead (see src/research_school_radar/api_sources.py), which gives exact dates, deadline, and fee.
  - name: IIASA
    url: https://iiasa.ac.at/events
    layer: 1.5
    region: continental Europe
    source_type: research_institute
    keywords: [climate, systems, summer school]
    scan_frequency: every_run
    enabled: false
    check_manually: true
    notes: Strong-relevance research institute, but the site sits behind Cloudflare bot management (a "Just a moment" challenge) that returns 403 to scripted requests and blocks even a real headless browser. Left disabled rather than circumvented; check it directly.
  - name: GFZ Potsdam
    url: https://www.gfz-potsdam.de/en/events
    layer: 1.5
    region: continental Europe
    source_type: research_institute
    keywords: [geoscience, training, school]
    scan_frequency: every_run
    notes: Strong geoscience relevance.
  - name: UKCEH
    url: https://www.ceh.ac.uk/filtered-training-listing
    layer: 1.5
    region: UK
    source_type: research_institute
    keywords: [hydrology, ecology, environmental science, training]
    scan_frequency: every_run
    notes: UK environmental science training listing. Previous /training redirected to a 403 page.
  - name: ICIMOD
    url: https://www.icimod.org/events/
    layer: 1.5
    region: South Asia
    source_type: intergovernmental_research
    keywords: [Himalayan, climate, water, capacity building]
    scan_frequency: every_run
    blocked_link_domains: [servir.icimod.org]
    notes: Strong regional water and climate relevance. SERVIR subdomain is skipped because local TLS certificate validation fails.
  - name: Asian Institute of Technology
    url: https://ait.ac.th/events/
    layer: 2
    region: Southeast Asia
    source_type: university
    keywords: [water, climate, training, short course]
    scan_frequency: every_run
    notes: Regional university source.
  - name: ECMWF Training
    url: https://www.ecmwf.int/en/learning/training
    layer: 1
    region: UK
    source_type: agency
    keywords: [climate, weather, machine learning, training]
    scan_frequency: every_run
    notes: European Centre for Medium-Range Weather Forecasts training catalogue. Many courses are online; in-person ones surface as candidates.
  - name: ESA EO4Society Training
    url: https://eo4society.esa.int/training-education/
    layer: 1
    region: continental Europe
    source_type: agency
    keywords: [remote sensing, earth observation, training, school]
    scan_frequency: every_run
    notes: European Space Agency Earth observation training and education.
  - name: NCAR ASP Colloquia
    url: https://asp.ucar.edu/asp-colloquia
    layer: 1.5
    region: North America
    source_type: research_institute
    keywords: [climate, atmospheric science, summer colloquium]
    scan_frequency: every_run
    notes: NCAR Advanced Study Program summer colloquia, usually funded for early-career researchers.
  - name: PIK Potsdam Events
    url: https://www.pik-potsdam.de/en/news/events
    layer: 1.5
    region: continental Europe
    source_type: research_institute
    keywords: [climate, climate impacts, school, workshop]
    scan_frequency: every_run
    notes: Potsdam Institute for Climate Impact Research events.
  - name: HIDA Events
    url: https://www.helmholtz-hida.de/en/events/
    layer: 1.5
    region: continental Europe
    source_type: research_network
    keywords: [data science, AI, machine learning, school]
    scan_frequency: every_run
    notes: Helmholtz Information and Data Science Academy events, including schools for environmental data science.
  - name: MLSS Index
    url: http://mlss.cc/
    layer: 1
    region: global
    source_type: community_index
    keywords: [machine learning, summer school]
    scan_frequency: every_run
