    keywords: [climate, physics, AI, school, workshop]
    scan_frequency: every_run
    enabled: false
    notes: Highly relevant (Abdus Salam ICTP runs many funded schools) but the site returns 404 for scripted requests on every known listing path. Re-enable when a stable public listing or feed is found.
  - name: LxMLS
    url: https://lxmls.it.pt/
