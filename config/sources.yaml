  - name: AMS Meetings
    url: https://www.ametsoc.org/ams/meetings-events/
    layer: 1
    region: North America
    source_type: scientific_society
    keywords: [atmospheric science, climate, weather, short course]
    scan_frequency: every_run
    notes: American Meteorological Society meetings and short courses.
  - name: WCRP
    url: https://www.wcrp-climate.org/
    layer: 1
    region: global
    source_type: research_network
    keywords: [climate, climate research, training, school]
    scan_frequency: every_run
    notes: World Climate Research Programme. The /events path 404s; the homepage links current activities.
  - name: WMO ETRP
    url: https://etrp.wmo.int/
    layer: 1
    region: global
    source_type: agency
    keywords: [meteorology, hydrology, climate, training]
    scan_frequency: every_run
    notes: World Meteorological Organization Education and Training Programme.
  - name: GFDL Events
    url: https://www.gfdl.noaa.gov/events/
    layer: 2
    region: North America
    source_type: research_institute
    keywords: [climate modelling, geophysical fluid dynamics, training]
    scan_frequency: every_run
    notes: NOAA Geophysical Fluid Dynamics Laboratory events.
  - name: Urbino Summer School
    url: https://www.urbinossp.it/
    layer: 2
    region: continental Europe
    source_type: summer_school
    keywords: [paleoclimatology, climate, summer school]
    scan_frequency: every_run
    enabled: false
    notes: Urbino Summer School in Paleoclimatology. The urbinossp.it domain is currently parked/for sale, so it serves no content. Re-enable when the school publishes a working site.
  - name: CIDER
    url: https://www.deep-earth.org/
    layer: 2
    region: North America
    source_type: summer_school
    keywords: [geoscience, deep earth, geophysics, summer school]
    scan_frequency: every_run
    notes: Cooperative Institute for Dynamic Earth Research summer programme.
  - name: Oxford ML Summer School
    url: https://www.oxfordml.school/
    layer: 2
    region: UK
    source_type: summer_school
    keywords: [machine learning, AI, health, finance, summer school]
    scan_frequency: every_run
    notes: OxML summer school on machine learning across application tracks.
  - name: AMMI
    url: https://aimsammi.org/
    layer: 2
    region: Africa
    source_type: summer_school
    keywords: [machine learning, AI, summer school]
    scan_frequency: every_run
    notes: African Master of Machine Intelligence, fully funded programme.
  - name: IEEE GRSS
    url: https://www.grss-ieee.org/events-calendar/
    layer: 1
    region: global
    source_type: scientific_society
    keywords: [remote sensing, geoscience, earth observation, summer school]
    scan_frequency: every_run
    enabled: false
    check_manually: true
    notes: IEEE Geoscience and Remote Sensing Society events calendar. Cloudflare blocks the GitHub Actions runner's IP with a 403 (it loads from a normal browser). Check it directly.
  - name: ISPRS
    url: https://www.isprs.org/
    layer: 1
    region: global
    source_type: scientific_society
    keywords: [remote sensing, photogrammetry, geoinformation, summer school]
    scan_frequency: every_run
    notes: International Society for Photogrammetry and Remote Sensing. Calendar path 404s; homepage links current activities.
  - name: GSA
    url: https://www.geosociety.org/
    layer: 1
    region: North America
    source_type: scientific_society
    keywords: [geoscience, geology, short course]
    scan_frequency: every_run
    notes: Geological Society of America. Direct event-list path 404s for scripted requests; homepage links current events.
  - name: EAGE
    url: https://eage.org/events/calendar-of-events/
    layer: 1
    region: continental Europe
    source_type: scientific_society
    keywords: [geophysics, geoscience, near-surface, short course]
    scan_frequency: every_run
    notes: European Association of Geoscientists and Engineers; runs many short courses and education days.
  - name: EarthScope
    url: https://www.earthscope.org/event/
    layer: 1.5
    region: North America
    source_type: research_consortium
    keywords: [seismology, geodesy, geophysics, short course]
    scan_frequency: every_run
    notes: EarthScope Consortium (formerly IRIS/UNAVCO); seismology and geodesy short courses and summer workshops.
  - name: CIG Geodynamics
    url: https://geodynamics.org/events
    layer: 2
    region: North America
    source_type: research_network
    keywords: [geodynamics, computational geoscience, modelling, workshop]
    scan_frequency: every_run
    notes: Computational Infrastructure for Geodynamics; computational geoscience workshops and training.
  - name: EUMETSAT Training
    url: https://classroom.eumetsat.int/
    layer: 1
    region: continental Europe
    source_type: agency
    keywords: [meteorology, climate, remote sensing, earth observation, training]
    scan_frequency: every_run
    notes: EUMETSAT training portal for satellite meteorology and climate.
  - name: ICOS
    url: https://www.icos-cp.eu/news-and-events/events
    layer: 1.5
    region: continental Europe
    source_type: research_infrastructure
    keywords: [carbon, climate, greenhouse gas, observation, training]
    scan_frequency: every_run
    notes: Integrated Carbon Observation System events and training.
  - name: ICTP-SAIFR
    url: https://www.ictp-saifr.org/
    layer: 2
    region: Latin America
    source_type: research_institute
    keywords: [physics, data science, machine learning, climate, school]
    scan_frequency: every_run
    notes: South American Institute for Fundamental Research (ICTP partner); runs data science, ML, and climate schools.
  - name: Lamont-Doherty
    url: https://lamont.columbia.edu/events
    layer: 1.5
    region: North America
    source_type: research_institute
    keywords: [climate, oceanography, seismology, geoscience, earth observation]
    scan_frequency: every_run
    enabled: false
    check_manually: true
    notes: Lamont-Doherty Earth Observatory (Columbia University). The events page returns 403 to scripted requests even with a browser User-Agent (bot protection). Check it directly.
  - name: IPAM
    url: https://www.ipam.ucla.edu/programs/summer-schools/
    layer: 1.5
    region: North America
    source_type: research_institute
    keywords: [machine learning, data science, applied mathematics, summer school]
    scan_frequency: every_run
    notes: UCLA Institute for Pure and Applied Mathematics; graduate summer schools in data science, ML, and computational science, usually with travel support.
  - name: CLIVAR
    url: https://www.clivar.org/events
    layer: 1
    region: global
    source_type: research_network
    keywords: [climate, climate variability, oceanography, summer school]
    scan_frequency: every_run
    notes: World Climate Research Programme's CLIVAR project; climate variability and predictability schools and events.
  - name: APECS
    url: https://www.apecs.is/
    layer: 2
    region: global
    source_type: research_network
    keywords: [polar, cryosphere, climate, early-career]
    scan_frequency: every_run
    notes: Association of Polar Early Career Scientists; polar and cryosphere training schools and webinars.
  - name: Barcelona Supercomputing Center
    url: https://www.bsc.es/education/training
    layer: 2
    region: continental Europe
    source_type: research_institute
    keywords: [machine learning, high performance computing, data science, training]
    scan_frequency: every_run
    notes: BSC training in high-performance and data-driven computational science, including ML for science.
  - name: Climate Change AI
    url: https://www.climatechange.ai/events
    layer: 1.5
    region: global
    source_type: research_network
    keywords: [AI, machine learning, climate, scientific machine learning, summer school]
    scan_frequency: every_run
    enabled: false
    check_manually: true
    notes: Climate Change AI is on-domain (AI for climate), but its events page is a client-side-rendered listing and its flagship summer school is virtual (excluded by the in-person rule). Check it directly for any in-person events.
  - name: Summer Schools in Europe
    url: https://www.summerschoolsineurope.eu/
    layer: 2
    region: continental Europe
    source_type: aggregator
    keywords: [summer school, multidisciplinary]
    scan_frequency: every_run
    enabled: false
    notes: Cross-disciplinary aggregator. Disabled when the project refocused on water/climate/geoscience/remote-sensing/ML; it is mostly off-domain and also returns 403 for scripted requests.
  - name: Utrecht Summer School
    url: https://utrechtsummerschool.nl/courses
    layer: 2
    region: continental Europe
    source_type: university
    keywords: [summer school, multidisciplinary]
    scan_frequency: every_run
    enabled: false
    notes: Large general summer school programme. Disabled when the project refocused on its core domain; most courses are off-domain and fee-based.
  - name: CERN Academic Training
    url: https://academictraining.cern.ch/
    layer: 1.5
    region: continental Europe
    source_type: research_institute
    keywords: [physics, computing, data science, lectures]
    scan_frequency: every_run
    render: true
    notes: Content is rendered client-side, so this source uses the optional Playwright headless browser. Falls back to an empty fetch if Playwright is not installed.
  - name: ICTP
    url: https://www.ictp.it/home/scientific-calendar
    layer: 1
    region: continental Europe
    source_type: research_institute
    keywords: [climate, geophysics, physics, AI, school, workshop]
    scan_frequency: every_run
    notes: Abdus Salam ICTP runs many funded schools in geophysics, climate, and scientific ML. The /scientific-calendar path 404s; /home/scientific-calendar works for scripted requests.
  - name: LxMLS
    url: https://lxmls.it.pt/
    layer: 2
    region: continental Europe
    source_type: summer_school
    keywords: [machine learning, natural language processing, summer school]
    scan_frequency: every_run
    notes: Lisbon Machine Learning School. The root is a meta-refresh landing page that points to the current edition; the scanner now follows it.
