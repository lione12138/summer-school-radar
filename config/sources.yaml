    source_type: summer_school
    keywords: [machine learning, AI, summer school]
    scan_frequency: every_run
    notes: Eastern European Machine Learning Summer School.
  - name: Mediterranean ML Summer School
    url: https://www.m2lschool.org/
    layer: 2
    region: continental Europe
    source_type: summer_school
    keywords: [machine learning, AI, summer school]
    scan_frequency: every_run
    notes: M2L summer school on machine learning.
  - name: Nordic ProbAI
    url: https://probabilistic.ai/
    layer: 2
    region: continental Europe
    source_type: summer_school
    keywords: [machine learning, probabilistic AI, summer school]
    scan_frequency: every_run
    notes: Nordic Probabilistic AI School.
  - name: Gaussian Process Summer School
    url: https://gpss.cc/
    layer: 2
    region: UK
    source_type: summer_school
    keywords: [machine learning, Gaussian processes, summer school]
    scan_frequency: every_run
    notes: Sheffield Gaussian Process Summer School, relevant to uncertainty quantification.
  - name: Deep Learning Indaba
    url: https://deeplearningindaba.com/
    layer: 2
    region: Africa
    source_type: summer_school
    keywords: [machine learning, AI, summer school]
