  - name: IAHR
    url: https://www.iahr.org/index/events
    layer: 1
    region: global
    source_type: scientific_society
    keywords: [hydraulics, hydro-environment, water resources, training]
    scan_frequency: every_run
    notes: International Association for Hydro-Environment Engineering and Research.
  - name: SIWI
    url: https://siwi.org/event
    layer: 1.5
    region: continental Europe
    source_type: research_institute
    keywords: [water, water governance, training]
    scan_frequency: every_run
    notes: Stockholm International Water Institute events.
  - name: GEWEX
    url: https://www.gewex.org/event/
    layer: 1.5
    region: global
    source_type: research_network
    keywords: [climate, water cycle, energy, training]
    scan_frequency: every_run
