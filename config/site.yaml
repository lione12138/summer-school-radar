analytics:
  # Options: none, cloudflare, goatcounter
  #
  # Recommended: cloudflare. Cloudflare Web Analytics is free, privacy-friendly
  # (no cookies, nothing personal collected) and — importantly — the visitor
  # dashboard is PRIVATE: only you, signed in to your Cloudflare account, can see
  # the numbers. The token below is the only thing that appears in the public
  # page source; it does not let anyone read your stats.
  provider: cloudflare

  # Cloudflare Web Analytics setup (one time, ~2 minutes):
  #   1. Go to https://dash.cloudflare.com/ -> Analytics & Logs -> Web Analytics.
  #   2. "Add a site" and enter hostname: lione12138.github.io
  #      (no DNS / nameserver change is needed for a GitHub Pages site).
  #   3. Cloudflare shows a <script> snippet containing data-cf-beacon
  #      '{"token":"XXXX...."}'. Copy that token string into cloudflare_token.
  #   4. The next daily scan (or a manual scan) bakes it into the site.
  # Until a token is set, no analytics script is emitted.
  cloudflare_token: "f65282c4900d476e9e4d19495c33f6ab"

  # GoatCounter alternative:
  # If your dashboard is https://example.goatcounter.com, set goatcounter_code to
  # "example". Note: GoatCounter's free hosted dashboard is publicly viewable by
  # default — turn off "Allow viewing without login" in its settings to keep your
  # visitor numbers private.
  goatcounter_code: ""

seo:
  # Google Search Console verification (optional but recommended for indexing):
  #   1. Go to https://search.google.com/search-console and add a property of
  #      type "URL prefix": https://lione12138.github.io/summer-school-radar/
  #   2. Choose the "HTML tag" verification method. Google shows a meta tag like
  #      <meta name="google-site-verification" content="ABC123..."> — paste only
  #      the content value below.
  #   3. After the next scan/publish, click Verify in Search Console, then submit
  #      the sitemap: sitemap.xml
  google_site_verification: "GMeFvYIQC8oRdXq81_LXuZIESFfpOtNTnehGkxABxDE"
