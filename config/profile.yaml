# Topic keywords gate relevance: a candidate must match at least one of these
# to qualify. The list is deliberately focused on the project's core domain —
# water, climate, geoscience, remote sensing, and scientific machine learning —
# so the relevance gate stays strong and the source registry is tractable. The
# hard quality filters (deadline, duration, funding/fee, in-person) are separate.
preferred_topics:
  # Water and hydrology
  - hydrology
  - hydrogeology
  - groundwater
  - water resources
  - water quality
  - water management
  - flood
  - drought
  - hydrometeorology
  # Climate and atmosphere
  - climate
  - climate change
  - climate extremes
  - climate modelling
  - environmental modelling
  - environmental science
  - meteorology
  - atmospheric science
  - oceanography
  - glaciology
  - cryosphere
  # Geoscience and earth observation
  - geoscience
  - geology
  - geophysics
  - seismology
  - geodesy
  - soil science
  - remote sensing
  - earth observation
  - satellite
  - geospatial
  - GIS
  # Hazards and sustainability
  - disaster risk
  - natural hazards
  - sustainability
  - ecology
  # AI and scientific machine learning
  - AI
  - artificial intelligence
  - machine learning
  - deep learning
  - scientific machine learning
  - data science
  - uncertainty quantification
  # Language and computational linguistics (the academic study of language,
  # not language-teaching courses — "pure language course" stays excluded).
  - linguistics
  - computational linguistics
  - natural language processing
  - language technology
  - speech processing
  - phonetics
  - phonology
  - syntax
  - semantics
  - morphology
  - corpus linguistics
  - psycholinguistics
  - language documentation
  # Computing and data science (broader CS subfields)
  - computer vision
  - image processing
  - software engineering
  - programming languages
  - formal methods
  - cybersecurity
  - network security
  - cryptography
  - data analysis
  - data analytics
  - databases
  - distributed systems
  - high performance computing
  - human-computer interaction
  - computer graphics
  - robotics
  - bioinformatics
  - computational biology
  # Physics, astronomy, and quantum
  - physics
  - astrophysics
  - astronomy
  - cosmology
  - condensed matter
  - particle physics
  - statistical physics
  - quantum computing
  - quantum information
  # Mathematics and statistics
  - mathematics
  - applied mathematics
  - statistics
  - probability
  - optimization
  - dynamical systems
  # Chemistry, materials, and engineering
  - chemistry
  - computational chemistry
  - materials science
  - nanoscience
  - engineering
  - mechanics
  - fluid dynamics
  - control theory
  # Health and cognition
  - epidemiology
  - public health
  - biostatistics
  - cognitive science
  # Law, education, and the built environment
  - law
  - international law
  - education research
  - marine biology
  - urban studies
  - urban planning
  - geography
  - architecture
  - design
  - history of science
  - philosophy of science
  - agriculture
  - food science
  # AI x neuroscience (the computational / data side of brain science)
  - computational neuroscience
  - neuroscience
  - neural computation
  - systems neuroscience
  - theoretical neuroscience
  - neuroAI
  # Social sciences and humanities
  - social science
  - social science methods
  - political science
  - economics
  - sociology
  - anthropology
  - psychology
  - history
  - philosophy
  - archaeology
  - literature
  - cultural studies
  - area studies
  - demography
  - social policy
  - digital humanities
  - education research

hard_filters:
  minimum_duration_days: 8
  require_funding_or_low_fee: true
  allow_online_only: false
  require_open_deadline: true

# Fixed, approximate reference rates keep the scanner free and API-key-free.
# They intentionally slightly overestimate EUR cost to reduce false inclusions.
financial_access:
  maximum_unfunded_fee_eur: 400
  approximate_currency_to_eur:
    EUR: 1.0
    USD: 0.95
    GBP: 1.20
    CHF: 1.10
    CNY: 0.13
    JPY: 0.006
    INR: 0.0115
    KRW: 0.00068
    SGD: 0.72
    AUD: 0.62
    CAD: 0.70

priority_regions:
  - UK
  - continental Europe
  - East Asia
  - Southeast Asia

supplementary_regions:
  - North America
  - Australia and New Zealand
  - South Asia
  - Middle East
  - Africa
  - Latin America

excluded_programme_types:
  - pure language course
  - undergraduate-only
  - tourism-oriented
  - business-only
  - high-fee without funding
  - PhD degree programme
  - doctoral admission
  - PhD position
  - full-time doctoral programme
  - graduate school enrollment

doctoral_school_scope:
  include: short-term doctoral schools, PhD schools, and graduate training schools when they are seasonal research training opportunities
  exclude: PhD admissions, PhD positions, full-time degree programmes, and ordinary graduate school enrollment
