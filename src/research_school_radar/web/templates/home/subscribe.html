<section id="subscribe" class="anchor">
  <div class="section-head">
    <h2 data-i18n="subscribe.title">Stay updated</h2>
  </div>
  <div class="panel">
    <p class="lead" data-i18n="subscribe.lead">Get an email when new funded schools open — no spam, unsubscribe anytime.</p>
    <form class="subscribe-form" action="{{ action }}" method="post" target="_blank">
      <input type="email" name="email" placeholder="you@example.com" aria-label="Email address" data-i18n-placeholder="subscribe.email.placeholder" data-i18n-aria-label="subscribe.email.label" required>
      <button type="submit" data-i18n="subscribe.submit">Get email alerts</button>
    </form>
  </div>
</section>
