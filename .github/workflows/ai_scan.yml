name: Weekly AI-assisted scan

on:
  workflow_dispatch:
  schedule:
    - cron: "17 12 * * 1"
  push:
    branches: [main]
    paths:
      - ".github/workflows/ai_scan.yml"
      - "config/ai.yaml"
      - "config/sources.yaml"
      - "src/research_school_radar/ai_*.py"
      - "src/research_school_radar/cli.py"
      - "src/research_school_radar/evidence_snippets.py"
      - "src/research_school_radar/llm_*.py"
      - "src/research_school_radar/semantic.py"

permissions:
  contents: write

concurrency:
  group: ai-scan-pages
  cancel-in-progress: false

jobs:
  scan-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_HOME: ${{ github.workspace }}/.cache/huggingface
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore bge-m3 model cache
        uses: actions/cache@v5
        with:
          path: .cache/huggingface
          key: huggingface-bge-m3-${{ runner.os }}

      - name: Restore advisory AI cache
        uses: actions/cache@v5
        with:
          path: data/ai_cache
          key: radar-ai-${{ runner.os }}-${{ hashFiles('config/ai.yaml', 'src/research_school_radar/llm_extract.py', 'src/research_school_radar/llm_validate.py') }}
          restore-keys: |
            radar-ai-${{ runner.os }}-

      - name: Install semantic and LLM dependencies
        run: pip install -e ".[dev,semantic,llm]"

      - name: Check DeepSeek secret
        shell: bash
        run: |
          if [ -z "${DEEPSEEK_API_KEY}" ]; then
            echo "DEEPSEEK_API_KEY repository secret is required." >&2
            exit 1
          fi

      - name: Check DeepSeek endpoint
        run: python -m research_school_radar.ai_healthcheck --provider deepseek

      - name: Run bounded AI-assisted scan
        run: python -m research_school_radar.cli scan --enable-semantic --enable-llm-extraction

      - name: Check out current Pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: _pages
          fetch-depth: 1

      - name: Publish generated site to gh-pages
        shell: bash
        run: |
          find _pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a site/. _pages/
          cd _pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Generated site is unchanged."
            exit 0
          fi
          git commit -m "Deploy AI-assisted scan ${GITHUB_RUN_ID}"
          git push origin HEAD:gh-pages

