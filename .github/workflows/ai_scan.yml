name: Build and publish Summa

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Refresh, audit without publishing, or run a publishing AI scan
        required: true
        default: refresh
        type: choice
        options:
          - refresh
          - audit
          - ai
      discovery:
        description: Use Serper broad discovery during a manual AI scan
        required: true
        default: true
        type: boolean
  schedule:
    # Recompute date-sensitive status daily, after the local 10:00 Asia/Shanghai
    # scan has had enough time to finish and push a complete snapshot.
    - cron: "17 6 * * *"
  push:
    branches: [main]
    paths:
      - "data/latest_candidates.json"
      - "data/latest_scan_manifest.json"
      - "data/latest_sources.json"
      - "data/opportunities.yml"
      - "config/ai.yaml"
      - "config/profile.yaml"
      - "config/site.yaml"
      - "config/sources.yaml"
      - "pyproject.toml"
      - "src/research_school_radar/**"
      - ".github/workflows/ai_scan.yml"

permissions:
  contents: write

concurrency:
  group: summa-site-publisher
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
      BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_HOME: ${{ github.workspace }}/.cache/huggingface
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select build mode
        id: build
        shell: bash
        run: |
          mode=refresh
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            mode="${{ inputs.mode }}"
          fi

          discovery=false
          scan=false
          if [ "$mode" = "ai" ] || [ "$mode" = "audit" ]; then
            scan=true
          fi
          if [ "$scan" = "true" ] && [ "${{ inputs.discovery }}" = "true" ]; then
            discovery=true
          fi

          can_build=true
          if [ "$mode" = "refresh" ]; then
            for snapshot in \
              data/latest_candidates.json \
              data/latest_sources.json \
              data/latest_scan_manifest.json; do
              if [ ! -s "$snapshot" ]; then
                echo "Missing required snapshot: $snapshot; the next successful local scan will create it."
                can_build=false
              fi
            done
          fi
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "scan=$scan" >> "$GITHUB_OUTPUT"
          echo "discovery=$discovery" >> "$GITHUB_OUTPUT"
          echo "can_build=$can_build" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.build.outputs.can_build == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore bge-m3 model cache
        if: steps.build.outputs.scan == 'true'
        uses: actions/cache@v5
        with:
          path: .cache/huggingface
          key: huggingface-bge-m3-${{ runner.os }}

      - name: Restore advisory AI cache
        if: steps.build.outputs.scan == 'true'
        uses: actions/cache@v5
        with:
          path: data/ai_cache
          key: summa-ai-${{ runner.os }}-${{ hashFiles('config/ai.yaml', 'src/research_school_radar/llm_extract.py', 'src/research_school_radar/llm_validate.py') }}
          restore-keys: |
            summa-ai-${{ runner.os }}-

      - name: Install application
        if: steps.build.outputs.can_build == 'true'
        shell: bash
        run: |
          if [ "${{ steps.build.outputs.scan }}" = "true" ]; then
            pip install -e ".[semantic,llm]"
          else
            pip install -e .
          fi

      - name: Check DeepSeek secret
        if: steps.build.outputs.scan == 'true'
        shell: bash
        run: |
          if [ -z "${DEEPSEEK_API_KEY}" ]; then
            echo "DEEPSEEK_API_KEY repository secret is required." >&2
            exit 1
          fi

      - name: Check Serper secret
        if: steps.build.outputs.discovery == 'true'
        shell: bash
        run: |
          if [ -z "${SERPER_API_KEY}" ]; then
            echo "SERPER_API_KEY repository secret is required when discovery is enabled." >&2
            exit 1
          fi

      - name: Check DeepSeek endpoint
        if: steps.build.outputs.scan == 'true'
        run: python -m research_school_radar.ai_healthcheck --provider deepseek --strict

      - name: Run bounded AI-assisted scan
        if: steps.build.outputs.scan == 'true'
        shell: bash
        run: |
          args=(--enable-semantic --enable-llm-extraction --no-readme-update)
          if [ "${{ steps.build.outputs.discovery }}" = "true" ]; then
            args+=(--include-discovery)
          fi
          python -m research_school_radar.cli scan "${args[@]}"

      - name: Require usable semantic and DeepSeek outputs
        if: steps.build.outputs.scan == 'true'
        run: python -m research_school_radar.ai_output_validation --site-dir site

      - name: Validate candidate snapshot schema and retention
        if: steps.build.outputs.scan == 'true'
        run: >-
          python -m research_school_radar.snapshot_validation
          --candidate-json site/candidates.json
          --previous-json data/latest_candidates.json

      - name: Rebuild from latest snapshot
        if: steps.build.outputs.mode == 'refresh' && steps.build.outputs.can_build == 'true'
        shell: bash
        run: |
          if [ -s data/latest_sources.json ]; then
            mkdir -p site
            cp data/latest_sources.json site/sources.json
          fi
          python -m research_school_radar.cli refresh-status \
            --candidates-json data/latest_candidates.json

      - name: Persist AI-enriched snapshot
        if: steps.build.outputs.mode == 'ai'
        shell: bash
        run: |
          for artifact in \
            site/candidates.json \
            site/sources.json \
            data/latest_scan_manifest.json; do
            if [ ! -s "$artifact" ]; then
              echo "AI scan did not produce required artifact: $artifact" >&2
              exit 1
            fi
          done
          cp site/candidates.json data/latest_candidates.json
          cp site/sources.json data/latest_sources.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "main advanced while the scan was running; refusing to publish a stale snapshot." >&2
            exit 1
          fi
          paths=(
            data/latest_candidates.json
            data/latest_sources.json
            data/latest_scan_manifest.json
          )
          git add -- "${paths[@]}"
          if git diff --cached --quiet; then
            echo "AI-enriched snapshot is unchanged."
          else
            git commit -m "Update AI-enriched candidate snapshot ${GITHUB_RUN_ID}" -- "${paths[@]}"
            git push origin HEAD:main
          fi

      - name: Build non-publishing search audit
        if: always() && steps.build.outputs.mode == 'audit'
        env:
          PYTHONPATH: src
        run: >-
          python -m research_school_radar.audit_report
          --site-dir site
          --previous-json data/latest_candidates.json
          --output-dir audit

      - name: Upload non-publishing audit artifacts
        if: always() && steps.build.outputs.mode == 'audit'
        uses: actions/upload-artifact@v4
        with:
          name: summa-search-audit-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            audit/
            site/scan-manifest.json
            site/candidates.json
            site/semantic_chunks.json
            site/ai_extractions.json
            site/translation-status.json
            reports/*.md
            reports/*.semantic.json
            reports/*.ai.json

      - name: Check out current Pages branch
        if: steps.build.outputs.can_build == 'true' && steps.build.outputs.mode != 'audit'
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: _pages
          fetch-depth: 1

      - name: Publish generated site to gh-pages
        if: steps.build.outputs.can_build == 'true' && steps.build.outputs.mode != 'audit'
        shell: bash
        run: |
          find _pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a site/. _pages/
          cd _pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Generated site is unchanged."
            exit 0
          fi
          git commit -m "Deploy Summa ${GITHUB_RUN_ID}"
          git push origin HEAD:gh-pages
